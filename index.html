<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-faint: #8a8a8a;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --accent: #c8553d;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; }
  body {
    background-image:
      radial-gradient(circle at 15% 20%, rgba(200,85,61,0.05) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(60,80,120,0.04) 0%, transparent 40%);
  }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 24px 64px; }

  header { text-align: center; margin-bottom: 36px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 44px; margin: 0 0 6px; letter-spacing: -0.02em; }
  h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .tag { font-size: 14px; color: var(--ink-soft); font-style: italic; font-family: 'Fraunces', serif; }

  .wheel-panel { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .wheel-wrap { position: relative; width: 100%; max-width: 460px; aspect-ratio: 1; }
  .pointer {
    position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent; border-right: 18px solid transparent;
    border-top: 28px solid var(--ink);
    z-index: 10;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
  }
  #wheel { width: 100%; height: 100%; transition: transform 4.8s cubic-bezier(0.17, 0.67, 0.21, 1); filter: drop-shadow(0 4px 16px rgba(0,0,0,0.08)); }
  .hub {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    font-family: 'Fraunces', serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint);
  }

  .spin-btn {
    background: var(--ink); color: var(--bg); border: none;
    padding: 16px 48px; font-size: 14px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    border-radius: 999px; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .spin-btn:hover:not(:disabled) { background: var(--accent); }
  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result {
    min-height: 80px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 6px;
  }
  .result-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-family: 'Inter', sans-serif; }
  .result-name { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 500; font-style: italic; color: var(--ink); }
  .result-hint { font-size: 14px; color: var(--ink-faint); font-style: italic; font-family: 'Fraunces', serif; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Spin the <em>Wheel</em></h1>
    <span class="tag">give it a turn</span>
  </header>

  <div class="wheel-panel">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg id="wheel" viewBox="0 0 320 320"></svg>
      <div class="hub">spin</div>
    </div>
    <button class="spin-btn" id="spin-btn">Spin</button>
    <div class="result" id="result-box">
      <span class="result-hint">Press spin to begin</span>
    </div>
  </div>
</div>

<script>
// ============================================================
// EDIT THESE TWO LISTS TO CONFIGURE YOUR WHEEL
// ============================================================

// All names that appear on the wheel
const NAMES = [
  'Rosa',
  'Justin',
  'Diana',
  'Sunny',
  'Jose',
  'Angelli',
  'Shay',
  'Bohdan',
  'Mike',
  'Irving',
  'Juan'
];

// Names that appear on the wheel but will NEVER be picked.
// Must match a name from NAMES exactly (case-sensitive).
const NEVER_PICK = [
  'Rosa',
  'Juan'
];

// ============================================================
// No need to edit below this line
// ============================================================

(function(){
  const SLICE_COLORS = [
    { fill: '#c8553d', text: '#fff' },
    { fill: '#e8b04b', text: '#3d2a08' },
    { fill: '#4a6b8a', text: '#fff' },
    { fill: '#7a9e7e', text: '#1f3322' },
    { fill: '#d4a5a5', text: '#4a2020' },
    { fill: '#5d4e6d', text: '#fff' },
    { fill: '#b8865b', text: '#fff' },
    { fill: '#3d6b6b', text: '#fff' },
    { fill: '#d97e6a', text: '#fff' }
  ];

  let spinning = false;
  let currentRotation = 0;

  const wheel = document.getElementById('wheel');
  const spinBtn = document.getElementById('spin-btn');
  const resultBox = document.getElementById('result-box');

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function polarToCartesian(cx, cy, r, angleDeg) {
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }
  function arcPath(cx, cy, r, startAngle, endAngle) {
    const start = polarToCartesian(cx, cy, r, endAngle);
    const end = polarToCartesian(cx, cy, r, startAngle);
    const large = endAngle - startAngle <= 180 ? 0 : 1;
    return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 0 ${end.x} ${end.y} Z`;
  }

  function renderWheel() {
    const cx = 160, cy = 160, r = 156;
    let svgContent = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f4f1ea" stroke="#1a1a1a" stroke-width="2"/>`;

    if (NAMES.length === 0) {
      svgContent += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#8a8a8a" font-family="Fraunces, serif" font-style="italic">No names configured</text>`;
    } else {
      const slice = 360 / NAMES.length;
      NAMES.forEach((name, i) => {
        const start = i * slice;
        const end = start + slice;
        const color = SLICE_COLORS[i % SLICE_COLORS.length];

        svgContent += `<path d="${arcPath(cx, cy, r, start, end)}" fill="${color.fill}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>`;

        const midAngle = start + slice / 2;
        const textPos = polarToCartesian(cx, cy, r * 0.62, midAngle);
        const display = name.length > 14 ? name.slice(0, 13) + '…' : name;
        const fontSize = NAMES.length > 14 ? 10 : NAMES.length > 10 ? 11 : NAMES.length > 6 ? 13 : 15;

        svgContent += `<text x="${textPos.x}" y="${textPos.y}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" fill="${color.text}" font-family="Inter, sans-serif" font-weight="500" transform="rotate(${midAngle}, ${textPos.x}, ${textPos.y})">${escapeHtml(display)}</text>`;
      });
    }
    wheel.innerHTML = svgContent;
  }

  function spin() {
    if (spinning) return;
    if (NAMES.length === 0) {
      resultBox.innerHTML = '<span class="result-hint" style="color:var(--accent);">No names configured</span>';
      return;
    }
    const eligible = NAMES.map((n, i) => ({ n, i })).filter(x => !NEVER_PICK.includes(x.n));
    if (eligible.length === 0) {
      resultBox.innerHTML = '<span class="result-hint" style="color:var(--accent);">No eligible names</span>';
      return;
    }

    spinning = true;
    spinBtn.disabled = true;
    resultBox.innerHTML = '<span class="result-hint">Spinning…</span>';

    const winner = eligible[Math.floor(Math.random() * eligible.length)];
    const slice = 360 / NAMES.length;
    const targetMid = winner.i * slice + slice / 2;
    const spins = 5 + Math.floor(Math.random() * 3);
    // Jitter must stay safely inside the slice — cap at ±35% of the half-width
    const jitter = (Math.random() - 0.5) * slice * 0.7;
    // Normalize currentRotation so the math is predictable
    const currentMod = ((currentRotation % 360) + 360) % 360;
    const desired = (360 - targetMid + jitter + 360) % 360;
    const delta = ((desired - currentMod) + 360) % 360;
    const finalRotation = spins * 360 + delta;
    currentRotation += finalRotation;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      spinBtn.disabled = false;
      resultBox.innerHTML = '';
    }, 4900);
  }

  spinBtn.addEventListener('click', spin);
  renderWheel();
})();
</script>
</body>
</html>
